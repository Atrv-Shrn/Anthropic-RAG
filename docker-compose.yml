# Local development infrastructure for the Anthropic RAG pipeline.
#
# Scope of this file (M1): the backing services — Qdrant (dense vectors), Redis
# (docstore + UPSERTS dedup), and a local Ollama daemon serving nomic-embed-text
# (dense embeddings only; generation goes to remote Ollama Cloud).
#
# The `app` container (pipeline + scheduler + MCP server) and its seed entrypoint
# are wired in M6. During M2-M5 we drive the pipeline from the host via `uv run`
# against these services.
#
# Lift to AWS EC2 for many users: same compose, deltas are env + security group
# (open the MCP port) + MCP_AUTH_TOKEN only — no pipeline code change.

services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    ports:
      - "16333:6333"   # REST / dashboard (host 16333 to avoid clashing with other local stacks)
      - "16334:6334"   # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /collections HTTP/1.1\\r\\nhost: localhost\\r\\n\\r\\n\" >&3 && head -n 1 <&3 | grep -q 200'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.31.1
    ports:
      - "11144:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    # GPU is optional; comment out if you have no NVIDIA runtime configured.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped